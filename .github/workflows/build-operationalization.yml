# managed-by: activ8-context-pack | pack-version: 1.1.0
name: Build Operationalization

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  operationalization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Buildwide Dry Run
        run: npm run operationalize:repo -- --dry-run

      - name: Action Persistence Check
        run: npm run action-persistence:check

      - name: Upload Operationalization Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-operationalization
          path: |
            artifacts/build-operationalization/**
            artifacts/action-persistence/**
            artifacts/source-query-ladder/**
          if-no-files-found: warn
